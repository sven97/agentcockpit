name: Deploy

on:
  release:
    types: [published]

# Required GitHub repo secrets:
#   GCP_PROJECT                    = agentcockpit-app
#   GCP_WORKLOAD_IDENTITY_PROVIDER = projects/536688950180/locations/global/workloadIdentityPools/github/providers/github-provider
#   GCP_SERVICE_ACCOUNT            = github-actions@agentcockpit-app.iam.gserviceaccount.com
#
# Watchtower polls Artifact Registry every 30s and auto-updates the container
# when a new :latest image is pushed.

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-docker.pkg.dev --quiet

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            VERSION=${{ github.sha }}
          tags: |
            us-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/agentcockpit/server:latest
            us-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/agentcockpit/server:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  verify:
    name: Verify deployment
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Watchtower to deploy new version
        env:
          EXPECTED: ${{ github.sha }}
        run: |
          echo "Waiting for https://agentcockpit.app/health to report version ${EXPECTED}..."
          for i in $(seq 1 40); do
            VERSION=$(curl -sf https://agentcockpit.app/health | python3 -c "import sys,json; print(json.load(sys.stdin).get('version',''))" 2>/dev/null || true)
            echo "  attempt $i: version=${VERSION}"
            if [ "$VERSION" = "$EXPECTED" ]; then
              echo "Deployed successfully: ${EXPECTED}"
              exit 0
            fi
            sleep 15
          done
          echo "Timed out waiting for deployment (10 minutes)"
          exit 1
