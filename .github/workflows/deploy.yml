name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# ── Required GitHub repo secrets ───────────────────────────────────────────────
#   GCP_PROJECT                    GCP project ID (e.g. agentcockpit-app)
#   GCP_WORKLOAD_IDENTITY_PROVIDER Workload Identity Federation provider
#   GCP_SERVICE_ACCOUNT            github-actions@<project>.iam.gserviceaccount.com
#   GCS_BUCKET                     Litestream backup bucket name
#
# ── One-time GCP setup (run once, then never again) ────────────────────────────
#   See deploy/cloudrun-setup.sh for the full setup script.
#
# ── How deployment works ────────────────────────────────────────────────────────
#   1. Build Docker image (litestream + agentcockpit) and push to Artifact Registry.
#   2. gcloud run deploy pushes the new revision to Cloud Run.
#      - Cloud Run starts the container, runs health checks.
#      - If healthy: shifts 100% traffic to new revision automatically.
#      - If unhealthy: keeps old revision serving, command fails with logs.
#   No SSH, no Watchtower, no polling required.

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-docker.pkg.dev --quiet

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            VERSION=${{ github.sha }}
          tags: |
            us-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/agentcockpit/server:latest
            us-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/agentcockpit/server:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  deploy:
    name: Deploy to Cloud Run
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy agentcockpit \
            --image="us-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/agentcockpit/server:${{ github.sha }}" \
            --region=us-central1 \
            --platform=managed \
            --min-instances=1 \
            --max-instances=1 \
            --cpu=1 \
            --memory=512Mi \
            --timeout=3600 \
            --concurrency=1000 \
            --allow-unauthenticated \
            --service-account="cloudrun@${{ secrets.GCP_PROJECT }}.iam.gserviceaccount.com" \
            --set-env-vars="DATA_DIR=/data,GCS_BUCKET=${{ secrets.GCS_BUCKET }}" \
            --set-secrets="AGENTCOCKPIT_SECRET=agentcockpit-secret:latest" \
            --project="${{ secrets.GCP_PROJECT }}"
