name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Test
        run: go test ./...

      - name: Build
        env:
          CGO_ENABLED: 0
        run: go build -ldflags="-s -w" -o agentcockpit ./cmd/agentcockpit
