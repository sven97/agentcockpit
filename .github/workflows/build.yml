name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Test
        run: go test ./...

      - name: Build (linux/amd64)
        env:
          CGO_ENABLED: 0
        run: go build -ldflags="-s -w" -o agentcockpit ./cmd/agentcockpit
