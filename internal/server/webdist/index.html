<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentCockpit</title>
<style>
:root {
  --bg:       #080808;
  --surface:  #0f0f0f;
  --card:     #131313;
  --border:   #1f1f1f;
  --border2:  #2a2a2a;
  --text:     #d8d8d8;
  --dim:      #909090;  /* 6.4:1 on --bg — WCAG AA */
  --dimmer:   #787878;  /* 4.6:1 on --bg — WCAG AA */
  --green:    #00d67c;
  --green-bg: #00d67c14;
  --amber:    #f5a623;
  --amber-bg: #f5a62314;
  --orange:   #f97316;
  --orange-bg:#f9731614;
  --red:      #ef4444;
  --red-bg:   #ef444414;
  --blue:     #3b82f6;
  --blue-bg:  #3b82f614;
  --font:     'SF Mono','Fira Code','Cascadia Code','Consolas','Courier New',monospace;
}

[data-theme="light"] {
  --bg:       #f0f0f0;
  --surface:  #ffffff;
  --card:     #ffffff;
  --border:   #e0e0e0;
  --border2:  #cccccc;
  --text:     #111111;
  --dim:      #555555;  /* 7.7:1 on --bg — WCAG AA */
  --dimmer:   #717171;  /* 4.6:1 on --bg — WCAG AA */
  --green:    #007a42;  /* 5.1:1 on --bg — WCAG AA */
  --green-bg: #007a4214;
  --amber:    #b56a00;
  --amber-bg: #b56a0014;
  --orange:   #c2410c;
  --orange-bg:#c2410c14;
  --red:      #dc2626;
  --red-bg:   #dc262614;
  --blue:     #1d4ed8;
  --blue-bg:  #1d4ed814;
}

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── Scan-line overlay (dark mode only) ── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,.06) 2px,
    rgba(0,0,0,.06) 4px
  );
  pointer-events: none;
  z-index: 9999;
}
[data-theme="light"] body::after { display: none; }

/* ── Auth Screen ── */
#auth {
  display: none;
  height: 100vh;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 0;
}
#auth.visible { display: flex; }

.auth-box {
  width: 380px;
  border: 1px solid var(--border2);
  background: var(--card);
}

.auth-logo {
  padding: 32px 32px 24px;
  border-bottom: 1px solid var(--border);
}

.auth-logo .wordmark {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: .15em;
  color: var(--green);
  text-transform: uppercase;
}

.auth-logo .tagline {
  font-size: 11px;
  color: var(--dim);
  margin-top: 4px;
  letter-spacing: .05em;
}

.auth-form {
  padding: 24px 32px 32px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.field label {
  display: block;
  font-size: 10px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 6px;
}

.field input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  padding: 9px 12px;
  outline: none;
  transition: border-color .15s;
}

.field input:focus { border-color: var(--green); }

.btn-primary {
  background: var(--green);
  color: #000;
  border: none;
  font-family: var(--font);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  padding: 10px 20px;
  cursor: pointer;
  width: 100%;
  margin-top: 4px;
  transition: opacity .15s;
}
.btn-primary:hover { opacity: .85; }
.btn-primary:disabled { opacity: .4; cursor: not-allowed; }
[data-theme="light"] .btn-primary { color: #fff; }

#auth-error, #reg-error {
  font-size: 11px;
  color: var(--red);
  text-align: center;
  min-height: 16px;
}

/* ── App Shell ── */
#app {
  display: none;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}
#app.visible { display: flex; }

/* ── Header ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  height: 44px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--surface);
}

.logo {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--green);
}

.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.ws-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  letter-spacing: .08em;
  color: var(--dim);
}

.ws-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--dimmer);
  transition: background .3s;
}
.ws-dot.connected { background: var(--green); }
.ws-dot.connecting { background: var(--amber); animation: blink 1s infinite; }

@keyframes blink {
  0%,100% { opacity: 1; }
  50% { opacity: .3; }
}

.btn-ghost {
  background: none;
  border: 1px solid var(--border2);
  color: var(--dim);
  font-family: var(--font);
  font-size: 10px;
  letter-spacing: .1em;
  text-transform: uppercase;
  padding: 5px 10px;
  cursor: pointer;
  transition: all .15s;
}
.btn-ghost:hover { border-color: var(--border2); color: var(--text); }
.btn-theme { font-size: 14px; text-transform: none; letter-spacing: 0; padding: 3px 9px; }

/* ── Approvals Banner ── */
#approvals-section {
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  max-height: 55vh;
  overflow-y: auto;
}

.section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 20px;
  font-size: 10px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--dim);
  position: sticky;
  top: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  z-index: 10;
}

.section-header .count {
  background: var(--border2);
  color: var(--text);
  font-size: 10px;
  padding: 1px 6px;
  min-width: 20px;
  text-align: center;
}

.section-header.alert-header {
  background: #1a0f00;
  border-bottom-color: #3a2000;
  color: var(--amber);
}

.section-header.alert-header .count {
  background: var(--amber);
  color: #000;
}

.approvals-list {
  padding: 12px 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.approval-card {
  border: 1px solid var(--border2);
  background: var(--card);
  animation: slideIn .2s ease;
  position: relative;
  overflow: hidden;
}

.approval-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
}

.approval-card.risk-read::before    { background: var(--green); }
.approval-card.risk-write::before   { background: var(--amber); }
.approval-card.risk-execute::before { background: var(--orange); }
.approval-card.risk-destructive::before { background: var(--red); }

@keyframes slideIn {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.approval-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px 10px;
}

.risk-badge {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .14em;
  text-transform: uppercase;
  padding: 2px 7px;
  flex-shrink: 0;
}

.risk-badge.read        { color: var(--green);  background: var(--green-bg);  }
.risk-badge.write       { color: var(--amber);  background: var(--amber-bg);  }
.risk-badge.execute     { color: var(--orange); background: var(--orange-bg); }
.risk-badge.destructive { color: var(--red);    background: var(--red-bg);    }

.tool-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  flex: 1;
}

.approval-meta {
  padding: 0 16px 10px;
  font-size: 10px;
  color: var(--dim);
  letter-spacing: .04em;
}

.tool-input-toggle {
  background: none;
  border: none;
  color: var(--dim);
  font-family: var(--font);
  font-size: 10px;
  cursor: pointer;
  padding: 0;
  letter-spacing: .04em;
  text-decoration: underline;
  text-decoration-style: dotted;
}
.tool-input-toggle:hover { color: var(--text); }

.tool-input-body {
  display: none;
  margin: 6px 16px 10px;
  padding: 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  font-size: 11px;
  color: var(--dim);
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 120px;
  overflow-y: auto;
  line-height: 1.6;
}
.tool-input-body.open { display: block; }

.approval-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  border-top: 1px solid var(--border);
}

.btn-allow, .btn-deny {
  border: none;
  font-family: var(--font);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  padding: 11px 20px;
  cursor: pointer;
  transition: opacity .15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.btn-allow {
  background: var(--green-bg);
  color: var(--green);
  border-right: 1px solid var(--border);
}
.btn-allow:hover { background: #00d67c22; }

.btn-deny {
  background: var(--red-bg);
  color: var(--red);
}
.btn-deny:hover { background: #ef444422; }

.btn-allow:disabled, .btn-deny:disabled { opacity: .4; cursor: not-allowed; }

.empty-state {
  padding: 24px 20px;
  font-size: 11px;
  color: var(--dimmer);
  letter-spacing: .04em;
}

.setup-card {
  margin: 16px;
  border: 1px solid var(--border2);
  background: var(--card);
}

.setup-card-title {
  font-size: 10px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--green);
  padding: 12px 14px 8px;
  border-bottom: 1px solid var(--border);
}

.setup-step {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
}
.setup-step:last-child { border-bottom: none; }

.setup-step-label {
  font-size: 10px;
  color: var(--dim);
  letter-spacing: .08em;
  margin-bottom: 6px;
}

.setup-cmd {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  padding: 7px 10px;
}

.setup-cmd code {
  flex: 1;
  font-family: var(--font);
  font-size: 11px;
  color: var(--text);
  word-break: break-all;
}

.copy-btn {
  background: none;
  border: none;
  color: var(--dim);
  font-family: var(--font);
  font-size: 10px;
  letter-spacing: .08em;
  cursor: pointer;
  padding: 2px 4px;
  flex-shrink: 0;
  transition: color .15s;
}
.copy-btn:hover { color: var(--green); }

/* ── Add Host Modal ── */
.modal-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.75);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}
.modal-backdrop.visible { display: flex; }

.modal {
  width: 480px;
  max-width: calc(100vw - 32px);
  background: var(--card);
  border: 1px solid var(--border2);
  display: flex;
  flex-direction: column;
  max-height: calc(100vh - 64px);
  overflow-y: auto;
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
}

.modal-title {
  font-size: 11px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--green);
}

.modal-close {
  background: none;
  border: none;
  color: var(--dim);
  font-size: 18px;
  line-height: 1;
  cursor: pointer;
  padding: 0 2px;
}
.modal-close:hover { color: var(--text); }

.modal-body { padding: 18px; display: flex; flex-direction: column; gap: 18px; }

.modal-step {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.modal-step-label {
  font-size: 10px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--dim);
}

.modal-step-label strong { color: var(--text); }

.modal-step p {
  font-size: 11px;
  color: var(--dim);
  line-height: 1.6;
}

.modal-divider {
  border: none;
  border-top: 1px solid var(--border);
}

.modal-code-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  letter-spacing: .25em;
  text-align: center;
  text-transform: uppercase;
  padding: 12px;
  outline: none;
  transition: border-color .15s;
}
.modal-code-input:focus { border-color: var(--green); }
.modal-code-input::placeholder { letter-spacing: .1em; font-size: 12px; }

.modal-error {
  font-size: 11px;
  color: var(--red);
  text-align: center;
  min-height: 14px;
}

.modal-success {
  text-align: center;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.modal-success-icon {
  font-size: 28px;
  color: var(--green);
}

.modal-success-text {
  font-size: 12px;
  color: var(--text);
  letter-spacing: .05em;
}

.modal-success-sub {
  font-size: 11px;
  color: var(--dim);
}

/* ── Main columns ── */
.columns {
  display: grid;
  grid-template-columns: 280px 1fr;
  flex: 1;
  overflow: hidden;
}

.col {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.col:first-child { border-right: 1px solid var(--border); }

.col-body {
  flex: 1;
  overflow-y: auto;
  padding: 10px 0;
}

/* ── Host rows ── */
.host-row {
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
  cursor: default;
  transition: background .1s;
}
.host-row:hover { background: var(--card); }
.host-row:last-child { border-bottom: none; }

.host-row-top {
  display: flex;
  align-items: center;
  gap: 8px;
}

.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

.status-dot.online {
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
  animation: pulse 2.5s infinite;
}

@keyframes pulse {
  0%,100% { box-shadow: 0 0 6px var(--green); }
  50%      { box-shadow: 0 0 12px var(--green), 0 0 4px var(--green); }
}

.status-dot.offline { background: var(--dimmer); }

.host-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.host-platform {
  font-size: 10px;
  color: var(--dimmer);
  letter-spacing: .06em;
  background: var(--border);
  padding: 1px 5px;
}

.host-meta {
  margin-top: 4px;
  font-size: 10px;
  color: var(--dimmer);
  padding-left: 15px;
  letter-spacing: .03em;
}

.host-remove {
  background: none;
  border: none;
  color: transparent;
  font-size: 14px;
  cursor: pointer;
  padding: 0 2px;
  line-height: 1;
  transition: color .15s;
  flex-shrink: 0;
}
.host-row:hover .host-remove { color: var(--dimmer); }
.host-remove:hover { color: var(--red) !important; }

.btn-authorize {
  margin-left: auto;
  background: var(--amber-bg);
  border: 1px solid var(--amber);
  color: var(--amber);
  font-family: var(--font);
  font-size: 11px;
  padding: 2px 10px;
  border-radius: 3px;
  cursor: pointer;
  transition: background .15s;
}
.btn-authorize:hover { background: #f5a62330; }

/* ── Session rows ── */
.session-row {
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
  transition: background .1s;
}
.session-row:hover { background: var(--card); }
.session-row:last-child { border-bottom: none; }

.session-row-top {
  display: flex;
  align-items: center;
  gap: 8px;
}

.session-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.status-badge {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  padding: 1px 6px;
  flex-shrink: 0;
}

.status-badge.running           { color: var(--blue);  background: var(--blue-bg);  }
.status-badge.awaiting_approval { color: var(--amber); background: var(--amber-bg); }
.status-badge.starting          { color: var(--dim);   background: var(--border);   }
.status-badge.stopped           { color: var(--dimmer);background: var(--border);   }
.status-badge.error             { color: var(--red);   background: var(--red-bg);   }

.session-meta {
  margin-top: 4px;
  font-size: 10px;
  color: var(--dimmer);
  padding-left: 15px;
  letter-spacing: .03em;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ── Loading / skeleton ── */
.loading {
  padding: 20px;
  color: var(--dimmer);
  font-size: 11px;
  letter-spacing: .06em;
}

.skeleton {
  background: linear-gradient(90deg, var(--border) 25%, var(--border2) 50%, var(--border) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  height: 12px;
  margin-bottom: 8px;
}
@keyframes shimmer {
  from { background-position: 200% 0; }
  to   { background-position: -200% 0; }
}

/* ── Scrollbars ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); }

/* ── Toast notifications ── */
#toast-container {
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 1000;
}

.toast {
  background: var(--card);
  border: 1px solid var(--border2);
  color: var(--text);
  font-size: 11px;
  padding: 10px 14px;
  animation: toastIn .2s ease, toastOut .3s ease 2.7s forwards;
  max-width: 280px;
  letter-spacing: .04em;
}

@keyframes toastIn  { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:none; } }
@keyframes toastOut { from { opacity:1; } to { opacity:0; } }

/* ── Responsive ── */
@media (max-width: 640px) {
  .columns { grid-template-columns: 1fr; }
  .col:first-child { display: none; }
}

/* ── Session attach button ── */
.btn-attach {
  margin-left: auto;
  background: none;
  border: 1px solid var(--border2);
  color: var(--dim);
  font-family: var(--font);
  font-size: 10px;
  letter-spacing: .08em;
  text-transform: uppercase;
  padding: 2px 8px;
  cursor: pointer;
  transition: all .15s;
  flex-shrink: 0;
}
.btn-attach:hover { color: var(--text); border-color: var(--green); }

/* ── Terminal overlay ── */
#term-modal { z-index: 1100; }

.term-container {
  width: 90vw;
  max-width: 1100px;
  height: 82vh;
  display: flex;
  flex-direction: column;
  background: #080808;
  border: 1px solid var(--border2);
}

.term-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--surface);
}

.term-title {
  font-size: 11px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--green);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.term-output {
  flex: 1;
  overflow-y: auto;
  padding: 10px 14px;
  font-family: var(--font);
  font-size: 12px;
  line-height: 1.5;
  color: #d0d0d0;
  background: #080808;
  white-space: pre-wrap;
  word-break: break-all;
}

[data-theme="light"] .term-output { background: #f5f5f5; color: #222; }

.term-input-row {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  border-top: 1px solid var(--border);
  background: var(--surface);
}

.term-prompt-sym {
  padding: 0 10px 0 14px;
  color: var(--green);
  font-size: 14px;
  flex-shrink: 0;
  user-select: none;
}

.term-input {
  flex: 1;
  background: none;
  border: none;
  color: var(--text);
  font-family: var(--font);
  font-size: 12px;
  padding: 10px 14px 10px 0;
  outline: none;
}

.term-input::placeholder { color: var(--dimmer); font-size: 11px; }
</style>
</head>
<body>

<!-- Auth -->
<div id="auth">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="wordmark">AgentCockpit</div>
      <div class="tagline">AI session control plane</div>
    </div>
    <form class="auth-form" id="login-form">
      <div class="field">
        <label>Email</label>

      </div>

      <button type="submit" class="btn-primary" id="login-btn">Sign in</button>

        No account? <a href="#" id="show-register" style="color:var(--green);text-decoration:none;">Register</a>

    <form class="auth-form" id="register-form" style="display:none;">
      <div class="field">
        <label>Name</label>

      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="reg-email" autocomplete="email" required placeholder="you@example.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="reg-password" autocomplete="new-password" required placeholder="••••••••">
      </div>
      <div id="reg-error"></div>
      <button type="submit" class="btn-primary" id="register-btn">Create account</button>
      <div style="text-align:center;font-size:11px;color:var(--dim);margin-top:4px;">
        Have an account? <a href="#" id="show-login" style="color:var(--green);text-decoration:none;">Sign in</a>
      </div>
    </form>
  </div>
</div>

<!-- App -->
<div id="app">
  <header>
    <span class="logo">AgentCockpit</span>
    <div class="header-right">
      <div class="ws-indicator">
        <div class="ws-dot" id="ws-dot"></div>
        <span id="ws-label">disconnected</span>
      </div>
      <button class="btn-ghost btn-theme" id="theme-btn" title="Toggle light/dark mode">◐</button>
      <button class="btn-ghost" id="logout-btn">Logout</button>
    </div>
  </header>

  <!-- Approvals (full-width top section) -->
  <div id="approvals-section">
    <div class="section-header" id="approvals-header">
      <span>Pending Approvals</span>
      <span class="count" id="approvals-count">0</span>

      <div class="empty-state">No pending approvals — all clear.</div>
    </div>
  </div>

  <!-- Hosts + Sessions -->
  <div class="columns">
    <div class="col">
      <div class="section-header">
        <span>Hosts</span>
        <span class="count" id="hosts-count">0</span>
        <button class="btn-ghost" id="add-host-btn" style="margin-left:auto;padding:3px 8px;font-size:10px;">+ Add</button>
      </div>
      <div class="col-body" id="hosts-list">
        <div class="loading">Loading...</div>
      </div>
    </div>
    <div class="col">
      <div class="section-header">
        <span>Sessions</span>
        <span class="count" id="sessions-count">0</span>
      </div>
      <div class="col-body" id="sessions-list">
        <div class="loading">Loading...</div>
      </div>
    </div>
  </div>
</div>

<!-- Add Host Modal -->
<div class="modal-backdrop" id="add-host-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Connect a host</span>
      <button class="modal-close" id="modal-close-btn">&#x2715;</button>
    </div>
    <div class="modal-body" id="modal-body">
      <div class="modal-step">
        <div class="modal-step-label" style="color:var(--dim);font-size:11px;">Generating secure invite...</div>
      </div>
    </div>
  </div>
</div>

<!-- Terminal Modal -->
<div class="modal-backdrop" id="term-modal">
  <div class="term-container">
    <div class="term-header">
      <span class="term-title" id="term-title">terminal</span>
      <span class="status-badge running" id="term-status" style="flex-shrink:0"></span>
      <button class="modal-close" id="term-close-btn">&#x2715;</button>
    </div>
    <pre class="term-output" id="term-output"></pre>
    <div class="term-input-row">
      <span class="term-prompt-sym">›</span>
      <input class="term-input" id="term-input" placeholder="type to send input — Enter to send, Ctrl+C to interrupt" autocomplete="off" spellcheck="false">
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script>
const $ = id => document.getElementById(id);

const state = {
  token: localStorage.getItem('ac_token'),
  hosts: [],
  sessions: [],
  approvals: [],
  pendingDevices: [],
  ws: null,
  wsState: 'disconnected',
};

// ── API ────────────────────────────────────────────────────────────────────────

async function api(method, path, body) {
  try {
    const res = await fetch(path, {
      method,
      headers: {
        'Authorization': `Bearer ${state.token}`,
        'Content-Type': 'application/json',
      },
      body: body ? JSON.stringify(body) : undefined,
    });
    if (res.status === 401) { logout(); return null; }
    if (!res.ok) {
      const text = await res.text();
      throw new Error(text || res.statusText);
    }
    if (res.status === 204 || res.headers.get('content-length') === '0') return null;
    const ct = res.headers.get('content-type') || '';
    if (ct.includes('application/json')) return res.json();
    return null;
  } catch (e) {
    if (e.name !== 'TypeError') throw e; // network error
    return null;
  }
}

// ── Auth ───────────────────────────────────────────────────────────────────────

function showAuth() {
  $('auth').classList.add('visible');
  $('app').classList.remove('visible');
}

function showApp() {
  $('auth').classList.remove('visible');
  $('app').classList.add('visible');
  fetchAll();
  connectWS();
}

function logout() {
  if (state.ws) { state.ws.close(); state.ws = null; }
  state.token = null;
  localStorage.removeItem('ac_token');
  showAuth();
}

$('login-form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = $('login-btn');
  const errEl = $('auth-error');
  errEl.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: $('email').value.trim(),
        password: $('password').value,
      }),
    });
    const data = await res.json();
    if (!res.ok) {
      errEl.textContent = data.error || 'Login failed';
      return;
    }
    state.token = data.token;
    localStorage.setItem('ac_token', data.token);
    showApp();
  } catch (err) {
    errEl.textContent = 'Network error — is the server running?';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign in';
  }
});

$('logout-btn').addEventListener('click', logout);

// ── Theme toggle ───────────────────────────────────────────────────────────────
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  $('theme-btn').textContent = theme === 'light' ? '◑' : '◐';
  localStorage.setItem('ac_theme', theme);
}
(function initTheme() {
  const saved = localStorage.getItem('ac_theme');
  const preferred = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
  applyTheme(saved || preferred);
})();
$('theme-btn').addEventListener('click', () => {
  const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  applyTheme(next);
});

$('show-register').addEventListener('click', e => {
  e.preventDefault();
  $('login-form').style.display = 'none';
  $('register-form').style.display = 'flex';
  $('reg-error').textContent = '';
  $('reg-name').focus();
});

$('show-login').addEventListener('click', e => {
  e.preventDefault();
  $('register-form').style.display = 'none';
  $('login-form').style.display = 'flex';
  $('auth-error').textContent = '';
  $('email').focus();
});

$('register-form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = $('register-btn');
  const errEl = $('reg-error');
  errEl.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Creating...';
  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: $('reg-name').value.trim(),
        email: $('reg-email').value.trim(),
        password: $('reg-password').value,
      }),
    });
    const data = await res.json();
    if (!res.ok) {
      errEl.textContent = data.error || 'Registration failed';
      return;
    }
    state.token = data.token;
    localStorage.setItem('ac_token', data.token);
    showApp();
  } catch (err) {
    errEl.textContent = 'Network error — is the server running?';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Create account';
  }
});

// ── Data fetching ──────────────────────────────────────────────────────────────

async function fetchAll() {
  const [hosts, sessions, approvals, pending] = await Promise.all([
    api('GET', '/api/hosts'),
    api('GET', '/api/sessions'),
    api('GET', '/api/approvals'),
    api('GET', '/api/device/pending'),
  ]);
  if (hosts    !== null) { state.hosts          = hosts    || []; renderHosts(); }
  if (sessions !== null) { state.sessions       = sessions || []; renderSessions(); }
  if (approvals!== null) { state.approvals      = approvals|| []; renderApprovals(); }
  if (pending  !== null) { state.pendingDevices = pending  || []; renderHosts(); }
}

// Poll for pending device authorizations every 4s so new `agentcockpit agent`
// invocations appear in the dashboard without a manual refresh.
setInterval(async () => {
  if (!state.token) return;
  const pending = await api('GET', '/api/device/pending');
  if (pending !== null) {
    const changed = JSON.stringify(pending) !== JSON.stringify(state.pendingDevices);
    state.pendingDevices = pending || [];
    if (changed) {
      renderHosts();
      // Also refresh host list in case an authorization just completed.
      const hosts = await api('GET', '/api/hosts');
      if (hosts !== null) { state.hosts = hosts || []; renderHosts(); }
    }
  }
}, 4000);

// ── WebSocket ──────────────────────────────────────────────────────────────────

function setWS(s) {
  state.wsState = s;
  const dot   = $('ws-dot');
  const label = $('ws-label');
  dot.className = 'ws-dot ' + s;
  label.textContent = s;
}

function connectWS() {
  if (state.ws) return;
  setWS('connecting');

  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}/ws/browser?token=${state.token}`);
  ws.binaryType = 'arraybuffer';
  state.ws = ws;

  ws.onopen = () => {
    setWS('connected');
    fetchAll();
  };

  ws.onclose = () => {
    state.ws = null;
    setWS('disconnected');
    // Reconnect after 5s
    setTimeout(() => { if (state.token) connectWS(); }, 5000);
  };

  ws.onerror = () => {
    ws.close();
  };

  ws.onmessage = e => {
    if (e.data instanceof ArrayBuffer) {
      // Binary PTY frame: [0x01][32-byte hex sessionId][PTY data]
      const buf = new Uint8Array(e.data);
      if (buf.length < 33 || buf[0] !== 0x01) return;
      const sessionId = String.fromCharCode(...buf.slice(1, 33));
      if (state.attachedSession && sessionId === state.attachedSession) {
        termWrite(new TextDecoder().decode(buf.slice(33)));
      }
      return;
    }
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }
    handleWS(msg);
  };
}

function handleWS(msg) {
  switch (msg.type) {
    case 'host_status': {
      const h = state.hosts.find(h => h.ID === msg.hostId);
      if (h) {
        h.Status = msg.status;
        renderHosts();
      } else {
        fetchAll(); // new host appeared
      }
      break;
    }
    case 'approval_request': {
      // Avoid duplicates
      if (!state.approvals.find(a => a.ID === msg.requestId)) {
        state.approvals.unshift({
          ID: msg.requestId,
          SessionID: msg.sessionId,
          ToolName: msg.toolName,
          ToolInput: typeof msg.toolInput === 'string' ? msg.toolInput : JSON.stringify(msg.toolInput, null, 2),
          RiskLevel: msg.riskLevel,
          Status: 'pending',
        });
        renderApprovals();
        toast(`⚠ Approval needed: ${msg.toolName}`);
      }
      break;
    }
    case 'approval_resolved': {
      state.approvals = state.approvals.filter(a => a.ID !== msg.id);
      renderApprovals();
      break;
    }
    case 'session_started': {
      const s = state.sessions.find(s => s.ID === msg.sessionId);
      if (s) { s.Status = 'running'; renderSessions(); }
      else fetchAll();
      break;
    }
    case 'session_stopped': {
      const s = state.sessions.find(s => s.ID === msg.sessionId);
      if (s) { s.Status = 'stopped'; renderSessions(); }
      if (state.attachedSession === msg.sessionId) {
        const sb = $('term-status');
        sb.textContent = 'stopped';
        sb.className = 'status-badge stopped';
      }
      break;
    }
  }
}

// ── Approval actions ───────────────────────────────────────────────────────────

async function resolve(id, decision) {
  const card = document.querySelector(`[data-id="${id}"]`);
  if (card) {
    card.querySelectorAll('button').forEach(b => b.disabled = true);
    card.style.opacity = '.5';
  }
  try {
    await api('POST', `/api/approvals/${id}`, { decision });
    state.approvals = state.approvals.filter(a => a.ID !== id);
    renderApprovals();
    toast(decision === 'approved' ? '✓ Allowed' : '✗ Denied');
  } catch (err) {
    if (card) {
      card.querySelectorAll('button').forEach(b => b.disabled = false);
      card.style.opacity = '1';
    }
    toast('Error: ' + err.message);
  }
}

// ── Rendering ──────────────────────────────────────────────────────────────────

function renderApprovals() {
  const list   = $('approvals-list');
  const header = $('approvals-header');
  const count  = $('approvals-count');
  const n = state.approvals.length;

  count.textContent = n;

  if (n > 0) {
    header.classList.add('alert-header');
  } else {
    header.classList.remove('alert-header');
  }

  if (n === 0) {
    list.innerHTML = '<div class="empty-state">No pending approvals — all clear.</div>';
    return;
  }

  list.innerHTML = state.approvals.map(a => {
    const risk = (a.RiskLevel || 'execute').toLowerCase();
    let inputStr = a.ToolInput || '';
    if (typeof inputStr === 'object') inputStr = JSON.stringify(inputStr, null, 2);
    try {
      const parsed = JSON.parse(inputStr);
      inputStr = JSON.stringify(parsed, null, 2);
    } catch {}
    const preview = inputStr.length > 60 ? inputStr.slice(0, 60) + '…' : inputStr;

    return `
<div class="approval-card risk-${risk}" data-id="${a.ID}">
  <div class="approval-header">
    <span class="risk-badge ${risk}">${risk}</span>
    <span class="tool-name">${esc(a.ToolName)}</span>
  </div>
  <div class="approval-meta">
    <span>session: ${esc((a.SessionID||'').slice(0,12))}…</span>
    &nbsp;·&nbsp;
    <button class="tool-input-toggle" onclick="toggleInput(this)">▸ view input</button>
    <div class="tool-input-body">${esc(inputStr)}</div>
  </div>
  <div class="approval-actions">
    <button class="btn-allow" onclick="resolve('${a.ID}','approved')">✓ Allow</button>
    <button class="btn-deny"  onclick="resolve('${a.ID}','rejected')">✗ Deny</button>
  </div>
</div>`;
  }).join('');
}

function toggleInput(btn) {
  const body = btn.nextElementSibling;
  const open = body.classList.toggle('open');
  btn.textContent = open ? '▾ hide input' : '▸ view input';
}

function renderHosts() {
  const el = $('hosts-list');
  const total = state.hosts.length + state.pendingDevices.length;
  $('hosts-count').textContent = total;

  if (!total) {
    el.innerHTML = '<div class="empty-state">No hosts connected. Click <strong style="color:var(--text)">+ Add</strong> to get started.</div>';
    return;
  }

  const pendingHtml = state.pendingDevices.map(d => `
<div class="host-row">
  <div class="host-row-top">
    <div class="status-dot" style="background:var(--amber);animation:blink 1s infinite"></div>
    <span class="host-name">${esc(d.hostname || 'unknown')}</span>
    <span class="host-platform">${esc(d.platform || '?')}</span>
    <button class="btn-authorize" onclick="authorizeDevice('${esc(d.user_code)}','${esc(d.hostname)}')">Authorize</button>
  </div>
  <div class="host-meta">waiting to connect · run <code>agentcockpit agent</code> then click Authorize</div>
</div>`).join('');

  const hostHtml = state.hosts.map(h => {
    const online = h.Status === 'online';
    const lastSeen = h.LastSeenAt ? relTime(h.LastSeenAt) : '—';
    return `
<div class="host-row">
  <div class="host-row-top">
    <div class="status-dot ${online ? 'online' : 'offline'}"></div>
    <span class="host-name">${esc(h.Name || h.Hostname || h.ID.slice(0,8))}</span>
    <span class="host-platform">${esc(h.Platform || '?')}</span>
    <button class="host-remove" onclick="removeHost('${esc(h.ID)}')" title="Remove host">&#x2715;</button>
  </div>
  <div class="host-meta">${esc(h.Hostname || '')}${h.Hostname ? ' · ' : ''}${online ? 'online' : 'last seen ' + lastSeen}</div>
</div>`;
  }).join('');

  el.innerHTML = pendingHtml + hostHtml;
}

async function authorizeDevice(userCode, hostname) {
  const res = await api('POST', '/api/device/authorize', { user_code: userCode, name: hostname });
  if (!res || res.error) { alert('Authorization failed — the request may have expired.'); return; }
  // Refresh both pending and hosts
  const [hosts, pending] = await Promise.all([
    api('GET', '/api/hosts'),
    api('GET', '/api/device/pending'),
  ]);
  if (hosts   !== null) { state.hosts          = hosts   || []; }
  if (pending !== null) { state.pendingDevices = pending || []; }
  renderHosts();
}

async function removeHost(id) {
  if (!confirm('Remove this host? The agent will stop connecting.')) return;
  const res = await api('DELETE', `/api/hosts/${id}`);
  if (res !== null && res?.error) { toast('Failed to remove host'); return; }
  state.hosts = state.hosts.filter(h => h.ID !== id);
  renderHosts();
}

function renderSessions() {
  const el = $('sessions-list');
  const count = $('sessions-count');
  count.textContent = state.sessions.length;

  if (!state.sessions.length) {
    el.innerHTML = '<div class="empty-state">No sessions yet.<br>Use the API to create a session.</div>';
    return;
  }

  // Find host name for each session
  const hostMap = {};
  state.hosts.forEach(h => { hostMap[h.ID] = h.Name || h.Hostname || h.ID.slice(0,8); });

  el.innerHTML = state.sessions.map(s => {
    const name = s.Name || s.AgentType || 'session';
    const hostName = hostMap[s.HostID] || s.HostID.slice(0,8);
    const dir = s.WorkingDir || '';
    const shortDir = dir.replace(/^\/Users\/[^/]+/, '~').replace(/^\/home\/[^/]+/, '~');
    const attachBtn = s.Status === 'running'
      ? `<button class="btn-attach" onclick="attachSession('${esc(s.ID)}','${esc(name)}','${esc(s.Status)}')">attach</button>`
      : '';
    return `
<div class="session-row">
  <div class="session-row-top">
    <div class="status-dot ${s.Status === 'running' ? 'online' : 'offline'}"></div>
    <span class="session-name">${esc(name)}</span>
    <span class="status-badge ${s.Status}">${s.Status}</span>
    ${attachBtn}
  </div>
  <div class="session-meta">${esc(s.AgentType)} · ${esc(hostName)} · ${esc(shortDir)}</div>
</div>`;
  }).join('');
}

// ── Utilities ──────────────────────────────────────────────────────────────────

// ── Add Host Modal ─────────────────────────────────────────────────────────────

let _modalPollTimer = null;

async function openAddHostModal() {
  $('add-host-modal').classList.add('visible');
  $('modal-body').innerHTML = '<div class="modal-step"><div class="modal-step-label" style="color:var(--dim)">Generating secure invite...</div></div>';

  try {
    const res = await fetch('/api/hosts/invite', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${state.token}` },
    });
    if (!res.ok) throw new Error('invite failed');
    const { token } = await res.json();
    const cmd = `curl -fsSL https://agentcockpit.sh | sh && agentcockpit connect --invite ${token}`;
    const hostCountBefore = state.hosts.length;

    $('modal-body').innerHTML = `
<div class="modal-step">
  <div class="modal-step-label">Run this command on your machine</div>
  <div class="setup-cmd" style="flex-direction:column;gap:6px;align-items:stretch;">
    <code style="word-break:break-all;line-height:1.7">${esc(cmd)}</code>
    <button class="copy-btn" style="align-self:flex-end;" data-cmd="${esc(cmd)}" onclick="copyCmd(this,this.dataset.cmd)">copy</button>
  </div>
  <p style="font-size:11px;color:var(--dim);line-height:1.6;">
    Installs the agent and connects this machine automatically.<br>
    Invite expires in <strong style="color:var(--text)">15 minutes</strong>.
  </p>
</div>
<hr class="modal-divider">
<div id="modal-waiting" style="text-align:center;font-size:11px;color:var(--dim);padding:4px 0;">
  <span style="animation:blink 1.2s infinite;display:inline-block">&#9679;</span>&nbsp; Waiting for host to connect...
</div>`;

    // Poll until a new host appears
    _modalPollTimer = setInterval(async () => {
      const hosts = await api('GET', '/api/hosts');
      if (hosts && hosts.length > hostCountBefore) {
        clearInterval(_modalPollTimer);
        const newHost = hosts.find(h => !state.hosts.find(old => old.ID === h.ID));
        state.hosts = hosts;
        renderHosts();
        $('modal-body').innerHTML = `
<div class="modal-success">
  <div class="modal-success-icon">&#x2713;</div>
  <div class="modal-success-text">${esc(newHost ? (newHost.Name || newHost.Hostname) : 'Host')} connected</div>
  <div class="modal-success-sub">Run <code style="color:var(--green)">agentcockpit agent</code> to bring it online.</div>
</div>`;
        setTimeout(closeAddHostModal, 3000);
      }
    }, 3000);
  } catch {
    $('modal-body').innerHTML = '<div class="modal-step"><div class="modal-step-label" style="color:var(--red)">Failed to generate invite. Please try again.</div></div>';
  }
}

function closeAddHostModal() {
  clearInterval(_modalPollTimer);
  $('add-host-modal').classList.remove('visible');
}

$('add-host-btn').addEventListener('click', openAddHostModal);
$('modal-close-btn').addEventListener('click', closeAddHostModal);
$('add-host-modal').addEventListener('click', e => { if (e.target === $('add-host-modal')) closeAddHostModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeAddHostModal(); });

function copyCmd(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = 'copied!';
    btn.style.color = 'var(--green)';
    setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 1500);
  });
}

function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function relTime(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const s = Math.floor(diff / 1000);
  if (s < 60)  return `${s}s ago`;
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  return `${Math.floor(s/3600)}h ago`;
}

function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  $('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

// ── Terminal / ANSI renderer ───────────────────────────────────────────────────

// Standard ANSI 16 colors (indices 0–15).
const ANSI16 = [
  '#1a1a1a','#cc0000','#4e9a06','#c4a000','#3465a4','#75507b','#06989a','#d3d7cf',
  '#555753','#ef2929','#8ae234','#fce94f','#729fcf','#ad7fa8','#34e2e2','#eeeeec',
];

// 256-color palette (first 16 = ANSI16, 16–231 = 6×6×6 cube, 232–255 = grayscale).
function ansiColor256(n) {
  if (n < 16) return ANSI16[n];
  if (n < 232) {
    n -= 16;
    const b = n % 6, g = Math.floor(n / 6) % 6, r = Math.floor(n / 36);
    const v = x => x ? x * 40 + 55 : 0;
    return `rgb(${v(r)},${v(g)},${v(b)})`;
  }
  const g = (n - 232) * 10 + 8;
  return `rgb(${g},${g},${g})`;
}

class AnsiRenderer {
  constructor() {
    this.lines = [[]]; // array of line arrays; each line = array of cells {ch,fg,bg,b,d,i,u}
    this.cx = 0; this.cy = 0;
    this.fg = null; this.bg = null;
    this.bold = false; this.dim = false; this.italic = false; this.underline = false;
    this._sx = 0; this._sy = 0; // saved cursor
  }

  _ensure(y) { while (this.lines.length <= y) this.lines.push([]); }

  _cell() { return { ch: ' ', fg: this.fg, bg: this.bg, b: this.bold, d: this.dim, i: this.italic, u: this.underline }; }

  _put(ch) {
    this._ensure(this.cy);
    const line = this.lines[this.cy];
    const cell = { ch, fg: this.fg, bg: this.bg, b: this.bold, d: this.dim, i: this.italic, u: this.underline };
    if (this.cx < line.length) line[this.cx] = cell;
    else { while (line.length < this.cx) line.push({ ch: ' ', fg: null, bg: null, b: false, d: false, i: false, u: false }); line.push(cell); }
    this.cx++;
  }

  _sgr(params) {
    if (!params.length) params = [0];
    let i = 0;
    while (i < params.length) {
      const n = params[i];
      if (n === 0)  { this.fg = null; this.bg = null; this.bold = false; this.dim = false; this.italic = false; this.underline = false; }
      else if (n === 1) this.bold = true;
      else if (n === 2) this.dim = true;
      else if (n === 3) this.italic = true;
      else if (n === 4) this.underline = true;
      else if (n === 22) { this.bold = false; this.dim = false; }
      else if (n === 23) this.italic = false;
      else if (n === 24) this.underline = false;
      else if (n >= 30 && n <= 37) this.fg = n - 30;
      else if (n === 38 && params[i+1] === 5) { this.fg = ansiColor256(params[i+2] || 0); i += 2; }
      else if (n === 38 && params[i+1] === 2) { this.fg = `rgb(${params[i+2]||0},${params[i+3]||0},${params[i+4]||0})`; i += 4; }
      else if (n === 39) this.fg = null;
      else if (n >= 40 && n <= 47) this.bg = n - 40;
      else if (n === 48 && params[i+1] === 5) { this.bg = ansiColor256(params[i+2] || 0); i += 2; }
      else if (n === 48 && params[i+1] === 2) { this.bg = `rgb(${params[i+2]||0},${params[i+3]||0},${params[i+4]||0})`; i += 4; }
      else if (n === 49) this.bg = null;
      else if (n >= 90 && n <= 97)  this.fg = n - 90 + 8;
      else if (n >= 100 && n <= 107) this.bg = n - 100 + 8;
      i++;
    }
  }

  write(text) {
    let i = 0;
    while (i < text.length) {
      const ch = text[i];
      if (ch === '\x1b') {
        const next = text[i+1];
        if (next === '[') {
          i += 2;
          let param = '';
          while (i < text.length && text[i] >= '\x30' && text[i] <= '\x3f') param += text[i++];
          while (i < text.length && text[i] >= '\x20' && text[i] <= '\x2f') i++; // intermediates
          const cmd = text[i] || ''; i++;
          const nums = param.split(';').map(s => s === '' ? 0 : +s);
          switch (cmd) {
            case 'm': this._sgr(nums); break;
            case 'H': case 'f':
              this.cy = Math.max(0, (nums[0] || 1) - 1);
              this.cx = Math.max(0, (nums[1] || 1) - 1);
              this._ensure(this.cy); break;
            case 'A': this.cy = Math.max(0, this.cy - (nums[0] || 1)); break;
            case 'B': this.cy += nums[0] || 1; this._ensure(this.cy); break;
            case 'C': this.cx += nums[0] || 1; break;
            case 'D': this.cx = Math.max(0, this.cx - (nums[0] || 1)); break;
            case 'E': this.cy += nums[0] || 1; this.cx = 0; this._ensure(this.cy); break;
            case 'F': this.cy = Math.max(0, this.cy - (nums[0] || 1)); this.cx = 0; break;
            case 'G': this.cx = Math.max(0, (nums[0] || 1) - 1); break;
            case 'J':
              if (nums[0] === 2 || nums[0] === 3) { this.lines = [[]]; this.cx = 0; this.cy = 0; }
              else if (!nums[0]) { this._ensure(this.cy); this.lines[this.cy].splice(this.cx); this.lines.splice(this.cy + 1); }
              break;
            case 'K':
              this._ensure(this.cy);
              if (!nums[0])       this.lines[this.cy].splice(this.cx);
              else if (nums[0] === 1) { for (let x = 0; x <= this.cx && x < this.lines[this.cy].length; x++) this.lines[this.cy][x] = { ch: ' ', fg: null, bg: null, b: false, d: false, i: false, u: false }; }
              else if (nums[0] === 2) { this.lines[this.cy] = []; this.cx = 0; }
              break;
            case 'P': if (this.lines[this.cy]) this.lines[this.cy].splice(this.cx, nums[0] || 1); break;
            case 's': this._sx = this.cx; this._sy = this.cy; break;
            case 'u': this.cx = this._sx; this.cy = this._sy; break;
            // ignore: h, l, r, S, T, X, @, and private sequences
          }
        } else if (next === ']') {
          // OSC — skip to BEL or ST
          i += 2;
          while (i < text.length) {
            if (text[i] === '\x07') { i++; break; }
            if (text[i] === '\x1b' && text[i+1] === '\\') { i += 2; break; }
            i++;
          }
        } else if (next === '(') {
          i += 3; // charset designation
        } else if (next === 'M') {
          this.cy = Math.max(0, this.cy - 1); i += 2; // reverse index
        } else {
          i += 2;
        }
      } else if (ch === '\r') {
        this.cx = 0; i++;
      } else if (ch === '\n') {
        this.cy++;
        this._ensure(this.cy);
        // Cap scrollback at 3000 lines
        if (this.lines.length > 3000) {
          const trim = 500;
          this.lines.splice(0, trim);
          this.cy = Math.max(0, this.cy - trim);
        }
        i++;
      } else if (ch === '\b') {
        if (this.cx > 0) this.cx--; i++;
      } else if (ch === '\t') {
        this.cx = (Math.floor(this.cx / 8) + 1) * 8; i++;
      } else if (ch.charCodeAt(0) < 32) {
        i++;
      } else {
        this._put(ch); i++;
      }
    }
  }

  render() {
    let html = '';
    for (let y = 0; y < this.lines.length; y++) {
      const line = this.lines[y] || [];
      if (!line.length) { html += '\n'; continue; }
      let lineHtml = '';
      let prevKey = null;
      for (let x = 0; x < line.length; x++) {
        const c = line[x];
        const key = `${c.fg}|${c.bg}|${c.b}|${c.d}|${c.i}|${c.u}`;
        if (key !== prevKey) {
          if (prevKey !== null) lineHtml += '</span>';
          const s = [];
          const fg = c.fg !== null ? (typeof c.fg === 'number' ? ANSI16[c.fg] : c.fg) : null;
          const bg = c.bg !== null ? (typeof c.bg === 'number' ? ANSI16[c.bg] : c.bg) : null;
          if (fg) s.push(`color:${fg}`);
          if (bg) s.push(`background:${bg}`);
          if (c.b) s.push('font-weight:bold');
          if (c.d) s.push('opacity:.55');
          if (c.i) s.push('font-style:italic');
          if (c.u) s.push('text-decoration:underline');
          lineHtml += s.length ? `<span style="${s.join(';')}">` : '<span>';
          prevKey = key;
        }
        const ch = c.ch;
        lineHtml += ch === '&' ? '&amp;' : ch === '<' ? '&lt;' : ch === '>' ? '&gt;' : ch;
      }
      if (prevKey !== null) lineHtml += '</span>';
      html += lineHtml + '\n';
    }
    return html;
  }
}

// ── Terminal state & functions ─────────────────────────────────────────────────

Object.assign(state, { attachedSession: null, termRenderer: null, termFlushId: null });

function attachSession(sessionId, name, status) {
  state.attachedSession = sessionId;
  state.termRenderer = new AnsiRenderer();
  $('term-title').textContent = name || sessionId.slice(0, 12);
  const sb = $('term-status');
  sb.textContent = status || 'running';
  sb.className = `status-badge ${status || 'running'}`;
  $('term-output').innerHTML = '';
  $('term-modal').classList.add('visible');
  $('term-input').focus();
  // Schedule periodic flush
  state.termFlushId = setInterval(termFlush, 80);
}

function detachSession() {
  state.attachedSession = null;
  state.termRenderer = null;
  if (state.termFlushId) { clearInterval(state.termFlushId); state.termFlushId = null; }
  $('term-modal').classList.remove('visible');
}

function termWrite(text) {
  if (!state.termRenderer) return;
  state.termRenderer.write(text);
}

function termFlush() {
  if (!state.termRenderer) return;
  const out = $('term-output');
  const atBottom = out.scrollHeight - out.scrollTop <= out.clientHeight + 40;
  out.innerHTML = state.termRenderer.render();
  if (atBottom) out.scrollTop = out.scrollHeight;
}

function sendInput(text) {
  if (!state.ws || state.wsState !== 'connected' || !state.attachedSession) return;
  // Go's []byte JSON-encodes as base64
  const encoded = btoa(unescape(encodeURIComponent(text)));
  state.ws.send(JSON.stringify({ type: 'stdin_data', sessionId: state.attachedSession, data: encoded }));
}

$('term-close-btn').addEventListener('click', detachSession);
$('term-modal').addEventListener('click', e => { if (e.target === $('term-modal')) detachSession(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && state.attachedSession) detachSession();
});

$('term-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    sendInput($('term-input').value + '\n');
    $('term-input').value = '';
  } else if (e.key === 'c' && e.ctrlKey) {
    e.preventDefault();
    sendInput('\x03');
  } else if (e.key === 'd' && e.ctrlKey) {
    e.preventDefault();
    sendInput('\x04');
  } else if (e.key === 'l' && e.ctrlKey) {
    e.preventDefault();
    sendInput('\x0c');
  }
});

// ── Init ───────────────────────────────────────────────────────────────────────

if (state.token) {
  showApp();
} else {
  showAuth();
}
</script>
