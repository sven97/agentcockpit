steps:
  - name: 'golang:1.26'
    id: build
    env:
      - 'CGO_ENABLED=0'
      - 'GOOS=linux'
      - 'GOARCH=amd64'
    args: ['go', 'build', '-ldflags=-s -w', '-o', 'agentcockpit', './cmd/agentcockpit']

  - name: 'gcr.io/cloud-builders/gcloud'
    id: upload
    args:
      - compute
      - scp
      - agentcockpit
      - agentcockpit-vm:/tmp/agentcockpit-new
      - --zone=us-central1-a

  - name: 'gcr.io/cloud-builders/gcloud'
    id: deploy
    args:
      - compute
      - ssh
      - agentcockpit-vm
      - --zone=us-central1-a
      - --command
      - >
        sudo mv /tmp/agentcockpit-new /usr/local/bin/agentcockpit &&
        sudo chmod +x /usr/local/bin/agentcockpit &&
        sudo systemctl restart agentcockpit &&
        sudo systemctl status agentcockpit --no-pager

options:
  logging: CLOUD_LOGGING_ONLY
