# Production docker-compose for GCP e2-micro VM.
# Image is pushed to Artifact Registry by GitHub Actions.
# Watchtower polls Artifact Registry and auto-updates the agentcockpit container.
# Litestream streams WAL to GCS for backup/DR.
#
# Required env vars (set in /etc/agentcockpit.env on the VM):
#   AGENTCOCKPIT_SECRET   — random 32+ char secret
#   GCP_PROJECT           — GCP project ID (used in image URL)
#   GCS_BUCKET            — GCS bucket name for Litestream backups
#
# Run: docker compose --env-file /etc/agentcockpit.env up -d

services:
  agentcockpit:
    image: us-docker.pkg.dev/${GCP_PROJECT}/agentcockpit/server:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:7080:7080"   # bind to localhost; Cloudflare/nginx terminates TLS
    volumes:
      - agentcockpit_data:/data
    environment:
      DATA_DIR: /data
      PORT: "7080"
      AGENTCOCKPIT_SECRET: ${AGENTCOCKPIT_SECRET}
    depends_on:
      litestream:
        condition: service_started
    command: ["/agentcockpit", "serve"]

  litestream:
    image: litestream/litestream:0.3.13
    restart: unless-stopped
    volumes:
      - agentcockpit_data:/data
      - ./litestream.yml:/etc/litestream.yml:ro
      - /root/.config/gcloud:/root/.config/gcloud:ro
    environment:
      GCS_BUCKET: ${GCS_BUCKET}
    command: ["replicate", "-config", "/etc/litestream.yml"]

  watchtower:
    image: containrrr/watchtower:1.7.1
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DOCKER_API_VERSION: "1.40"
      WATCHTOWER_POLL_INTERVAL: "30"        # check every 30 seconds
      WATCHTOWER_CLEANUP: "true"            # remove old images after update
      WATCHTOWER_INCLUDE_STOPPED: "false"
    command: agentcockpit-agentcockpit-1    # only watch this container

volumes:
  agentcockpit_data:
